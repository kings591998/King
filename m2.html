<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>الشنفري | Al-Shanfari</title>

  <!-- CSS مدمج -->
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
      color: #333;
      text-align: center;
    }

    header {
      background-color: #1d3557;
      color: white;
      padding: 40px 20px;
    }

    h1 {
      margin: 0;
      font-size: 3em;
    }

    p {
      font-size: 1.2em;
      margin-top: 10px;
    }

    main {
      padding: 40px 20px;
    }

    .btn {
      background-color: #457b9d;
      color: white;
      padding: 15px 30px;
      border: none;
      border-radius: 25px;
      font-size: 1em;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    .btn:hover {
      background-color: #1d3557;
    }

    footer {
      background-color: #f1f1f1;
      color: #777;
      padding: 20px;
      font-size: 0.9em;
    }

    .message-box {
      margin-top: 20px;
      font-weight: bold;
      color: #1d3557;
    }
  </style>
</head>
<body>

  <header>
    <h1>الشنفري</h1>
    <p>مرحبًا بك في موقع الشنفري — حيث الذكاء، الجنون، والاختراع يجتمعون</p>
  </header>

  <main>
    <p>هذه الصفحة قيد التطوير... نحن نبني عالمًا جديدًا.</p>
    <button class="btn" onclick="joinJourney()">✈️ انضم للرحلة</button>
    <div class="message-box" id="messageBox"></div>
  </main>

  <footer>
    &copy; 2025 الشنفري. كل الحقوق محفوظة.
  </footer>

  <!-- JavaScript مدمج -->
  <script>
    function joinJourney() {
      const message = "✨ لقد انضممت إلى رحلة الشنفري الكبرى! ترقّب المستقبل.";
      document.getElementById("messageBox").innerText = message;
    }
  </script>

</body>
</html>
