<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">ALSHANFRICC</title>
    <meta name="description" content="مجلة ALSHANFRICC - مساحة الأناقة والمعرفة">
    <link id="dynamic-font-link" rel="stylesheet" href="">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <!-- شاشة التحميل -->
    <div id="preloader">
        <div class="preloader-content">
            <div class="preloader-logo">ALSHANFRICC</div>
            <div class="preloader-bar-container">
                <div class="preloader-bar" id="preloader-bar"></div>
            </div>
            <div class="preloader-number" id="preloader-number">0%</div>
            <div class="preloader-dots">
                <span>.</span><span>.</span><span>.</span>
            </div>
        </div>
    </div>

    <!-- عرض فوري للهيكل الأساسي من localStorage -->
    <div id="instant-header"></div>
    <script>
        (function(){
            try {
                var raw = localStorage.getItem('alshanfricc_settings_cache');
                if (raw) {
                    var s = JSON.parse(raw).settings;
                    if (s) {
                        var header = document.getElementById('instant-header');
                        if (header) {
                            header.innerHTML = '<div style="background:rgba(0,0,0,0.4);color:white;padding:12px 20px;font-size:1.8rem;font-weight:bold;text-align:center;backdrop-filter:blur(10px);position:fixed;top:0;left:0;right:0;z-index:1000;">'+(s.siteName||'ALSHANFRICC')+'</div>';
                            document.body.style.paddingTop = '60px';
                        }
                        document.documentElement.style.setProperty('--primary', s.primaryColor||'#c48b4c');
                        document.body.style.fontFamily = (s.bodyFont||'Cairo')+', sans-serif';
                    }
                }
            }catch(e){}
        })();
    </script>

    <header id="site-header"></header>

    <main class="main-layout">
        <section id="posts-feed" class="feed"></section>
        <aside class="right-sidebar">
            <div class="sticky-widget">
                <h4>روابط سريعة</h4>
                <div id="sidebar-buttons"></div>
            </div>
        </aside>
    </main>

    <footer id="site-footer"></footer>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

    <script src="assets/js/firebase-config.js"></script>
    <script src="assets/js/utils.js"></script>
    <script src="assets/js/header.js"></script>
    <script src="assets/js/body.js"></script>
    <script src="assets/js/footer.js"></script>

    <script>
        (function() {
            const savedFont = localStorage.getItem('selectedFont') || 'Cairo';
            const link = document.getElementById('dynamic-font-link');
            link.href = `https://fonts.googleapis.com/css2?family=${savedFont.replace(/ /g, '+')}:wght@400;700&display=swap`;
            document.body.style.fontFamily = savedFont + ', sans-serif';
        })();

        function startPreloaderAnimation() {
            const bar = document.getElementById('preloader-bar');
            const number = document.getElementById('preloader-number');
            if (!bar || !number) return;
            let progress = 0;
            const interval = setInterval(() => {
                const increment = Math.max(1, Math.floor((100 - progress) / 15));
                progress = Math.min(100, progress + increment);
                bar.style.width = progress + '%';
                number.textContent = progress + '%';
                if (progress >= 100) clearInterval(interval);
            }, 80);
        }

        window.addEventListener('DOMContentLoaded', async () => {
            try {
                startPreloaderAnimation();
                await buildHeader();
                await loadPosts(1);
                await buildFooter();

                const siteName = await getSetting('siteName', 'ALSHANFRICC');
                document.getElementById('page-title').textContent = siteName;

                const instant = document.getElementById('instant-header');
                if (instant) instant.style.display = 'none';

                setTimeout(() => {
                    const preloader = document.getElementById('preloader');
                    if (preloader) {
                        preloader.classList.add('hidden');
                        setTimeout(() => preloader.remove(), 500);
                    }
                }, 300);

                console.log('✅ تم تحميل الموقع بنجاح');
            } catch (error) {
                console.error('❌ خطأ في تحميل الموقع:', error);
                document.getElementById('preloader')?.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
